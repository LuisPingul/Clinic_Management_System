<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0 fw-bold">Patient Portal Login</h4>
                    </div>
                    <div class="card-body p-4">
                        {% if error %}
                            <div class="alert alert-danger small">{{ error }}</div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="small fw-bold text-muted">First Name</label>
                                    <input type="text" name="first_name" class="form-control" placeholder="e.g. Luis" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold text-muted">Last Name</label>
                                    <input type="text" name="last_name" class="form-control" placeholder="e.g. Pingul" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="small fw-bold text-muted">Registered Phone Number</label>
                                <input type="text" name="phone_number" class="form-control" placeholder="e.g. 0917-123-4567" required>
                            </div>

                            <div class="mb-4">
                                <label class="small fw-bold text-muted">Date of Birth</label>
                                <input type="date" name="date_of_birth" class="form-control" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Access My Records</button>
                        </form>
                    </div>
                </div>
                <p class="text-center mt-3 text-muted small">Having trouble? Please visit the Front Desk.</p>
            </div>
        </div>
    </div>
</body>
</html>
